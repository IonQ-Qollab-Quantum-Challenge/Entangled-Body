services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: entangled-body-api
    working_dir: /app/apps/api
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: entangled-body-web
    working_dir: /app
    environment:
      API_PROXY_TARGET: http://api:8000
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - api
    ports:
      - "3000:3000"
