version: "3.9"

services:
  api:
    image: python:3.11-slim
    container_name: entangled-body-api
    working_dir: /app/apps/api
    volumes:
      - ./:/app
    command: bash -lc "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
